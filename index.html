<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kitchen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #232636;
      --border: #2e3147; --accent: #6c63ff; --accent2: #4ecca3;
      --danger: #ff6b6b; --warn: #ffd93d; --text: #e8e8f0; --muted: #8888aa;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; height: 56px; gap: 16px;
    }
    header .logo { font-size: 1.1rem; font-weight: 700; color: var(--accent2); white-space: nowrap; }
    header nav { display: flex; gap: 4px; margin-left: auto; }
    header nav button {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: .85rem; font-weight: 600; padding: 8px 14px; border-radius: 6px;
      transition: .15s; letter-spacing: .02em;
    }
    header nav button.active { background: var(--accent); color: #fff; }

    /* ── CONTENT ── */
    main { padding-top: 56px; min-height: 100vh; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── DATE NAV ── */
    .date-nav {
      display: flex; align-items: center; justify-content: center; gap: 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 8px; position: sticky; top: 56px; z-index: 40;
    }
    .date-nav button {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1.6rem; padding: 4px 18px; line-height: 1; user-select: none;
      transition: color .15s;
    }
    .date-nav button:active { color: var(--accent2); }
    .date-nav button.disabled { opacity: .2; pointer-events: none; }
    #date-label {
      font-size: 1.05rem; font-weight: 700; min-width: 220px;
      text-align: center; user-select: none;
    }
    #date-today-badge {
      font-size: .7rem; color: var(--accent2); margin-left: 8px;
      background: rgba(78,204,163,.15); padding: 2px 7px; border-radius: 10px;
      vertical-align: middle;
    }

    /* ── PROGRESS BAR ── */
    .pbar { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; flex: 1; }
    .pfill { height: 100%; border-radius: 4px; transition: width .3s; }

    /* ── SECTION HEADER ── */
    .section-head {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; background: var(--surface2);
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    }
    .section-head .label {
      font-size: .78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted);
    }
    .section-head .count { font-size: .78rem; color: var(--muted); white-space: nowrap; margin-left: auto; }

    /* ── CATEGORY HEADER ── */
    .cat-head {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px 8px 14px;
      background: rgba(35,38,54,.8);
      border-bottom: 1px solid var(--border);
    }
    .cat-head .cat-name { font-size: .8rem; font-weight: 700; letter-spacing: .04em; }
    .cat-head .cat-count { font-size: .75rem; color: var(--muted); margin-left: auto; white-space: nowrap; }

    /* ── TASK ROW ── */
    .task-row {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; min-height: 52px;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .task-row.done { background: rgba(78,204,163,.07); }
    .task-row input[type=checkbox] {
      width: 22px; height: 22px; cursor: pointer;
      accent-color: var(--accent2); flex-shrink: 0;
    }
    .task-row input[type=checkbox]:disabled { opacity: .4; }
    .task-name { flex: 1; font-size: .95rem; }
    .task-name.done { color: var(--muted); text-decoration: line-through; }
    .task-target { font-size: .78rem; color: var(--muted); white-space: nowrap; min-width: 60px; text-align: right; }
    .task-actual {
      width: 100px; padding: 6px 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text);
      font-size: .82rem; flex-shrink: 0;
    }
    .task-actual:disabled { opacity: .3; }
    .task-actual:focus { outline: none; border-color: var(--accent2); }

    /* ── PRODUCTION CARD ── */
    .prod-card {
      margin: 10px 14px; padding: 14px 16px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    }
    .prod-card .prod-recipe { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .prod-card .prod-meta { font-size: .82rem; color: var(--muted); }
    .prod-card .prod-note { font-size: .82rem; color: var(--warn); margin-top: 6px; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: .9rem; }

    /* ── STOCK ── */
    .stock-section { padding: 0; }
    .stock-cat-head {
      padding: 9px 16px;
      background: var(--surface2); border-bottom: 1px solid var(--border);
      border-top: 1px solid var(--border);
      font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
    }
    .stock-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
      font-size: .88rem;
    }
    .stock-row.zero { opacity: .35; }
    .stock-name { flex: 1; }
    .stock-qty { font-weight: 700; color: var(--accent2); min-width: 60px; text-align: right; }
    .stock-unit { color: var(--muted); min-width: 36px; font-size: .78rem; }
    .stock-note { font-size: .72rem; color: var(--muted); padding: 8px 16px 4px; }

    /* ── OVERALL PROGRESS ── */
    #overall-progress {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: var(--bg);
    }
    #overall-progress .prog-label { font-size: .82rem; color: var(--muted); white-space: nowrap; }
  </style>
</head>
<body>

<header>
  <span class="logo">🍽 Kitchen</span>
  <nav>
    <button class="active" id="tab-btn-prep" onclick="showTab('prep')">Prep &amp; Production</button>
    <button id="tab-btn-stock" onclick="showTab('stock')">Stock</button>
  </nav>
</header>

<main>

  <!-- PREP & PRODUCTION TAB -->
  <div class="tab-content active" id="tab-prep">

    <!-- Date nav -->
    <div class="date-nav">
      <button id="btn-prev" onclick="changeDate(-1)">&#8249;</button>
      <div id="date-label"></div>
      <button id="btn-next" onclick="changeDate(1)">&#8250;</button>
    </div>

    <!-- Overall prep progress -->
    <div id="overall-progress">
      <div class="pbar" style="height:8px"><div class="pfill" id="overall-pfill"></div></div>
      <span class="prog-label" id="overall-label"></span>
    </div>

    <!-- Prep tasks rendered here -->
    <div id="prep-content"></div>

    <!-- Production section -->
    <div class="section-head" style="margin-top:6px">
      <span class="label">Production Batches</span>
      <span class="count" id="prod-count"></span>
    </div>
    <div id="prod-content"></div>

  </div><!-- /tab-prep -->

  <!-- STOCK TAB -->
  <div class="tab-content" id="tab-stock">
    <div class="stock-note">Based on cumulative purchase history</div>
    <div id="stock-content"></div>
  </div>

</main>

<script src="data/db.js"></script>
<script>
// ── STATE ─────────────────────────────────────────────────────────────────
let viewDate = todayStr();
let currentTab = 'prep';

const PREP_CATS = ['Slice','Cook','Prep','Mix','Portion','Wash & Portion','Precook'];

// ── INIT ─────────────────────────────────────────────────────────────────
(async () => {
  await loadDB();
  renderDateLabel();
  renderPrepProd();
})();

// Touch swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (currentTab !== 'prep') return;
  if (Math.abs(dx) > 60) dx < 0 ? changeDate(1) : changeDate(-1);
}, { passive: true });

// ── TAB SWITCHING ────────────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('header nav button').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('tab-btn-' + tab).classList.add('active');
  if (tab === 'stock') renderStock();
}

// ── DATE NAVIGATION ──────────────────────────────────────────────────────
function changeDate(delta) {
  const d = new Date(viewDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  const next = d.toISOString().slice(0, 10);
  if (next > todayStr()) return; // no future
  viewDate = next;
  renderDateLabel();
  renderPrepProd();
}

function renderDateLabel() {
  const d = new Date(viewDate + 'T00:00:00');
  const isToday = viewDate === todayStr();
  const label = d.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('date-label').innerHTML =
    label + (isToday ? ' <span id="date-today-badge">TODAY</span>' : '');
  document.getElementById('btn-next').classList.toggle('disabled', isToday);
}

// ── PREP & PRODUCTION RENDER ─────────────────────────────────────────────
function renderPrepProd() {
  const isToday = viewDate === todayStr();
  const checks = db.prepDailyHistory?.[viewDate]?.checks || {};
  const tasks = db.prepTasks || [];

  const total = tasks.length;
  const done = tasks.filter(t => checks[t.id]?.done).length;
  const pct = total ? Math.round(done / total * 100) : 0;

  // Overall progress
  document.getElementById('overall-pfill').style.cssText =
    `width:${pct}%;background:${pct===100?'var(--accent2)':'var(--accent)'}`;
  document.getElementById('overall-label').textContent = `${done} / ${total} prep tasks done`;

  // Group tasks by category
  const grouped = {};
  PREP_CATS.forEach(c => grouped[c] = []);
  tasks.forEach(t => {
    if (!grouped[t.category]) grouped[t.category] = [];
    grouped[t.category].push(t);
  });

  // All categories including custom
  const allCats = [...PREP_CATS, ...Object.keys(grouped).filter(c => !PREP_CATS.includes(c))];

  const html = allCats.map(cat => {
    const catTasks = (grouped[cat] || []).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    if (!catTasks.length) return '';

    const catDone = catTasks.filter(t => checks[t.id]?.done).length;
    const catPct = catTasks.length ? Math.round(catDone / catTasks.length * 100) : 0;

    const rows = catTasks.map(t => {
      const c = checks[t.id] || {};
      const isDone = !!c.done;
      const isEditable = isToday;
      return `
        <div class="task-row${isDone ? ' done' : ''}">
          <input type="checkbox" ${isDone ? 'checked' : ''} ${isEditable ? '' : 'disabled'}
            onchange="kitchenToggleTask('${t.id}')">
          <span class="task-name${isDone ? ' done' : ''}">${t.name}</span>
          ${t.targetQty ? `<span class="task-target">${t.targetQty}</span>` : '<span class="task-target"></span>'}
          <input type="text" class="task-actual"
            value="${c.actualQty || ''}"
            placeholder="actual"
            ${(isDone && isEditable) ? '' : 'disabled'}
            onchange="kitchenSetActualQty('${t.id}', this.value)">
        </div>`;
    }).join('');

    return `
      <div class="cat-head">
        <span class="cat-name">${cat}</span>
        <div class="pbar"><div class="pfill" style="width:${catPct}%;background:${catPct===100?'var(--accent2)':'var(--accent)'}"></div></div>
        <span class="cat-count">${catDone}/${catTasks.length}</span>
      </div>
      ${rows}`;
  }).join('');

  document.getElementById('prep-content').innerHTML = html || '<div class="empty">No prep tasks set up yet.</div>';

  // Production
  const batches = (db.productionBatches || []).filter(b => b.date === viewDate);
  document.getElementById('prod-count').textContent = batches.length ? `${batches.length} logged` : '';

  if (!batches.length) {
    document.getElementById('prod-content').innerHTML = '<div class="empty">No production batches logged for this date.</div>';
  } else {
    document.getElementById('prod-content').innerHTML = batches.map(b => {
      const recipe = (db.recipes || []).find(r => r.id === b.recipeId);
      const recipeName = recipe?.name || 'Unknown recipe';
      const batchCount = b.batchesLogged ?? 1;
      const portions = b.portionsProduced ?? 0;
      return `
        <div class="prod-card">
          <div class="prod-recipe">${recipeName}</div>
          <div class="prod-meta">${batchCount} batch${batchCount !== 1 ? 'es' : ''} &nbsp;·&nbsp; ${portions} portion${portions !== 1 ? 's' : ''} produced</div>
          ${b.note ? `<div class="prod-note">📝 ${b.note}</div>` : ''}
        </div>`;
    }).join('');
  }
}

// ── PREP INTERACTION (today only) ────────────────────────────────────────
function kitchenToggleTask(taskId) {
  if (viewDate !== todayStr()) return;
  if (!db.prepDailyHistory) db.prepDailyHistory = {};
  const day = db.prepDailyHistory[viewDate] || { checks: {} };
  const c = day.checks[taskId] || {};
  day.checks[taskId] = { ...c, done: !c.done };
  db.prepDailyHistory[viewDate] = day;
  saveDB();
  renderPrepProd();
}

function kitchenSetActualQty(taskId, val) {
  if (viewDate !== todayStr()) return;
  if (!db.prepDailyHistory) db.prepDailyHistory = {};
  const day = db.prepDailyHistory[viewDate] || { checks: {} };
  day.checks[taskId] = { ...(day.checks[taskId] || {}), actualQty: val };
  db.prepDailyHistory[viewDate] = day;
  saveDB();
}

// ── STOCK RENDER ─────────────────────────────────────────────────────────
function renderStock() {
  const ingredients = (db.ingredients || []).filter(i => !i.obsolete);

  // Group by category
  const grouped = {};
  ingredients.forEach(i => {
    const cat = i.category || 'Uncategorised';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(i);
  });

  const cats = Object.keys(grouped).sort();
  const html = cats.map(cat => {
    const items = grouped[cat].sort((a, b) => a.name.localeCompare(b.name));
    const rows = items.map(i => {
      const qty = parseFloat(i.totalBaseUnits || 0);
      return `
        <div class="stock-row${qty <= 0 ? ' zero' : ''}">
          <span class="stock-name">${i.name}</span>
          <span class="stock-qty">${qty % 1 === 0 ? qty : qty.toFixed(2)}</span>
          <span class="stock-unit">${i.recipeUnit || ''}</span>
        </div>`;
    }).join('');
    return `<div class="stock-cat-head">${cat}</div>${rows}`;
  }).join('');

  document.getElementById('stock-content').innerHTML = html || '<div class="empty">No ingredients added yet.</div>';
}
</script>
</body>
</html>
